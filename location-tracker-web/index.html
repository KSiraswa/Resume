<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Location Sharing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="glass-card" id="main-card">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="location-icon">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
            </div>
            
            <h1 class="title">Verify Your Location</h1>
            <p class="subtitle">Please share your location to complete the security verification process securely.</p>
            
            <button id="share-btn" class="primary-button">
                <span>Share Location securely</span>
                <div class="loader-spinner" id="btn-spinner"></div>
            </button>

            <div id="error-message" class="error-message hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="error-text">Location access denied.</span>
            </div>
        </div>

        <div class="glass-card hidden" id="result-card">
            <div class="icon-container success">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            
            <h1 class="title">Verification Successful</h1>
            <p class="subtitle">Your location coordinates have been securely retrieved.</p>
            
            <div class="data-group">
                <div class="data-item">
                    <span class="data-label">Latitude</span>
                    <span class="data-value" id="lat-display">--</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Longitude</span>
                    <span class="data-value" id="lng-display">--</span>
                </div>
            </div>

            <a id="maps-link" href="#" target="_blank" class="secondary-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
                View on Google Maps
            </a>
            
            <button id="reset-btn" class="text-button">Scan Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
